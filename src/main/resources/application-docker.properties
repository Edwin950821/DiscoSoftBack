# ==========================================
# CONFIGURACIÓN DOCKER - SPRING BOOT
# ==========================================

# --- SERVER ---
server.port=8080

# --- DATASOURCE (PostgreSQL/Supabase) ---
# Usa variables de entorno definidas en docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/HIBERNATE ---
# ddl-auto: create (crea tablas), update (actualiza), validate (solo valida)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT (Propiedades personalizadas) ---
# Estas se leen desde una clase de configuración con @ConfigurationProperties
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- CORS (Propiedades personalizadas) ---
# Se lee desde SecurityConfig o CorsConfig
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# --- LOGGING ---
logging.level.root=INFO
logging.level.com.kompralo=DEBUG
logging.level.org.springframework.security=DEBUG