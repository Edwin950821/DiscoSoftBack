server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/monastery}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:changeme-set-this-in-environment-variables-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://monastery-club.web.app,https://monastery-club.firebaseapp.com}

socketio.host=0.0.0.0
socketio.port=${SOCKETIO_PORT:3001}

logging.level.root=INFO
logging.level.com.kompralo=DEBUG
