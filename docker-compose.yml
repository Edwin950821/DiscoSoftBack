version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kompralo-db
    environment:
      POSTGRES_DB: kompralo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kompralo-app
    ports:
      - "8080:8080"
      - "3001:3001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kompralo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      JWT_SECRET: TuClaveSecretaSuperSeguraDeAlMenos256BitsParaHS256AlgorithmDebeSerMuyLarga
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
